<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#000000"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="456" width="512" height="56" rx="0" fill="#3ddc84" opacity="0.12"/>
  <rect x="44" y="456" width="424" height="4" rx="2" fill="#3ddc84"/>

  <!-- kmans - white, large -->
  <text
    x="256"
    y="260"
    text-anchor="middle"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="800"
    font-size="148"
    letter-spacing="-2"
    fill="#f5f5f7"
  >kmans</text>

  <!-- golf - green, smaller, below -->
  <text
    x="256"
    y="390"
    text-anchor="middle"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="800"
    font-size="120"
    letter-spacing="-1"
    fill="#3ddc84"
  >golf</text>
</svg>
